name: Label Issues

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  # ── Analyse issue content and apply labels ──────────────────────────────────
  label-issue:
    name: Auto-label issue
    runs-on: ubuntu-latest

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch repository labels
        id: repo-labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          labels=$(gh api "repos/${{ github.repository }}/labels" \
            --jq '[.[].name] | join(", ")' 2>/dev/null \
            || echo "bug, enhancement, documentation, question, help wanted, good first issue")
          echo "list=${labels}" >> "$GITHUB_OUTPUT"

      - name: Classify issue with Claude
        id: classify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          AVAILABLE_LABELS: ${{ steps.repo-labels.outputs.list }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, subprocess, sys

          api_key = os.environ.get("ANTHROPIC_API_KEY", "")
          if not api_key:
              print("::warning::ANTHROPIC_API_KEY is not set. Skipping label classification.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("labels=[]\n")
              sys.exit(0)

          title     = os.environ.get("ISSUE_TITLE", "").strip()
          body      = os.environ.get("ISSUE_BODY", "").strip() or "(no description provided)"
          available = os.environ.get("AVAILABLE_LABELS", "").strip()

          prompt = (
              "You are a GitHub issue labeller. Read the issue below and select the most "
              "appropriate labels from the available list.\n\n"
              f"Available labels: {available}\n\n"
              f"Issue title: {title}\n\n"
              f"Issue body:\n{body}\n\n"
              "Respond with ONLY a valid JSON array of label name strings selected from "
              'the available labels. Example: ["bug", "enhancement"]. '
              "If no labels are appropriate, respond with []."
          )

          try:
              result = subprocess.run(
                  ["claude", "--dangerously-skip-permissions", "-p", prompt],
                  capture_output=True, text=True, timeout=120,
              )
          except subprocess.TimeoutExpired:
              print("::warning::Claude CLI timed out after 120 s. Skipping label classification.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("labels=[]\n")
              sys.exit(0)
          except FileNotFoundError:
              print("::error::Claude CLI executable not found. Verify the installation step.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("labels=[]\n")
              sys.exit(1)

          if result.returncode != 0:
              stderr_preview = result.stderr.strip()[:300]
              print(f"::warning::Claude CLI exited with code {result.returncode}: {stderr_preview}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("labels=[]\n")
              sys.exit(0)

          output = result.stdout.strip()
          match = re.search(r"\[.*?\]", output, re.DOTALL)
          if match:
              try:
                  arr = json.loads(match.group())
                  if isinstance(arr, list):
                      labels = [str(x) for x in arr if isinstance(x, str) and x.strip()]
                      with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                          f.write(f"labels={json.dumps(labels)}\n")
                      sys.exit(0)
              except json.JSONDecodeError:
                  pass

          print(f"::warning::Could not parse a JSON array from Claude output: {output[:300]}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("labels=[]\n")
          PYEOF

      - name: Apply labels to issue
        if: steps.classify.outputs.labels != '[]' && steps.classify.outputs.labels != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABELS_JSON: ${{ steps.classify.outputs.labels }}
        run: |
          label_csv=$(python3 -c "import json,os; print(','.join(json.loads(os.environ['LABELS_JSON'])))")
          if [ -n "$label_csv" ]; then
            gh issue edit "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --add-label "$label_csv"
          fi
